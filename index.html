<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darb</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--y:#F5C518;--yd:#D4A017;--ym:#FAEEDA;--bg:#FAFAF8;--card:#fff;--txt:#1A1A1A;--muted:#6B6B6B;--bdr:rgba(0,0,0,0.08);}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);direction:rtl;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1A1A1A;}
.login-box{background:#222;border-radius:20px;padding:40px;width:340px;text-align:center;}
.login-logo{font-size:36px;font-weight:700;color:#F5C518;margin-bottom:8px;}
.login-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;}
.login-input{width:100%;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px 16px;color:white;font-size:13px;font-family:'Cairo',sans-serif;outline:none;margin-bottom:12px;}
.login-input::placeholder{color:rgba(255,255,255,0.3);}
.login-btn{width:100%;background:#F5C518;color:#1A1A1A;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:4px;}
.login-err{font-size:12px;color:#E24B4A;margin-top:8px;}

/* APP */
.app{display:none;flex;min-height:100vh;}
.sb{width:210px;background:#1A1A1A;display:flex;flex-direction:column;padding:20px 0;position:fixed;height:100vh;}
.logo{padding:0 18px 20px;border-bottom:0.5px solid rgba(255,255,255,0.1);}
.logo-t{font-size:22px;font-weight:700;color:#F5C518;}
.logo-s{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;}
.nav{padding:14px 10px;flex:1;display:flex;flex-direction:column;gap:3px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,0.4);font-size:12px;font-weight:500;transition:all .25s;}
.ni:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);transform:translateX(-3px);}
.ni.active{background:#F5C518;color:#1A1A1A;}
.ni svg{width:16px;height:16px;flex-shrink:0;}
.ndiv{height:0.5px;background:rgba(255,255,255,0.08);margin:6px 10px;}
.usr{padding:14px;border-top:0.5px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:9px;}
.uav{width:34px;height:34px;border-radius:50%;background:#F5C518;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#1A1A1A;flex-shrink:0;}
.un{font-size:11px;font-weight:600;color:white;}
.up{font-size:10px;color:#F5C518;}
.main{flex:1;margin-right:210px;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:0.5px solid var(--bdr);background:var(--card);position:sticky;top:0;z-index:10;}
.pt{font-size:15px;font-weight:700;}
.dbadge{font-size:11px;color:var(--muted);background:var(--ym);padding:4px 11px;border-radius:20px;}
.content{padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
.page{display:none;flex-direction:column;gap:14px;}
.page.active{display:flex;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border:0.5px solid var(--bdr);border-radius:13px;padding:15px 17px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.ct{font-size:13px;font-weight:700;}
.badd{font-size:11px;background:#F5C518;color:#1A1A1A;padding:6px 14px;border-radius:8px;font-weight:700;cursor:pointer;border:none;font-family:'Cairo',sans-serif;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.sc{background:var(--card);border:0.5px solid var(--bdr);border-radius:12px;padding:14px 16px;}
.sl{font-size:10px;color:var(--muted);margin-bottom:5px;}
.sv{font-size:22px;font-weight:700;}
.ss{font-size:10px;color:var(--muted);margin-top:3px;}
.sbar{height:4px;background:var(--bdr);border-radius:2px;margin-top:9px;overflow:hidden;}
.sbf{height:100%;background:#F5C518;border-radius:2px;}
.ti{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:0.5px solid var(--bdr);}
.ti:last-child{border-bottom:none;}
.tck{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.tck.done{background:#F5C518;border-color:#F5C518;}
.tck.done::after{content:'';width:8px;height:4px;border-left:2px solid #1A1A1A;border-bottom:2px solid #1A1A1A;transform:rotate(-45deg) translateY(-1px);display:block;}
.tt{font-size:12px;flex:1;}
.tt.done{text-decoration:line-through;color:var(--muted);}
.ttag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
.ty{background:#FAEEDA;color:#854F0B;}.tg{background:#F1EFE8;color:#5F5E5A;}.tgr{background:#EAF3DE;color:#3B6D11;}.tb{background:#E6F1FB;color:#185FA5;}
.tdl{width:18px;height:18px;border:none;background:none;cursor:pointer;color:#ccc;font-size:13px;}
.tdl:hover{color:#E24B4A;}
.wcard{background:#1A1A1A;border-radius:13px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;}
.wt h2{font-size:17px;font-weight:700;color:white;}
.wt p{font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px;}
.wsv{font-size:19px;font-weight:700;color:#F5C518;}
.wsl{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;text-align:center;}
.gi{margin-bottom:12px;}.gi:last-child{margin-bottom:0;}
.gt{display:flex;justify-content:space-between;margin-bottom:5px;}
.gn{font-size:11px;font-weight:600;}.gp{font-size:11px;font-weight:700;color:#D4A017;}
.gb{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.gf{height:100%;border-radius:3px;background:#F5C518;}
.hchat{background:#111;border-radius:13px;overflow:hidden;display:flex;flex-direction:column;}
.hhead{background:#1A1A1A;padding:14px 18px;display:flex;align-items:center;gap:11px;}
.hav{width:38px;height:38px;border-radius:50%;background:#F5C518;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.hname{font-size:14px;font-weight:700;color:white;}
.hsub{font-size:10px;color:rgba(255,255,255,0.35);}
.hdot{width:7px;height:7px;background:#4CAF50;border-radius:50%;animation:pulse 2s infinite;margin-right:auto;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hmsgs{padding:14px 18px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;min-height:300px;max-height:300px;}
.mrow{display:flex;gap:7px;align-items:flex-end;}
.mrow.user{flex-direction:row-reverse;}
.mav2{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.mav2.bot{background:#F5C518;color:#1A1A1A;}.mav2.user{background:#333;color:rgba(255,255,255,0.6);}
.bbl{max-width:78%;padding:9px 13px;font-size:12px;line-height:1.6;}
.bbl.bot{background:#222;color:rgba(255,255,255,0.85);border-radius:4px 13px 13px 13px;}
.bbl.user{background:#F5C518;color:#1A1A1A;border-radius:13px 4px 13px 13px;font-weight:600;}
.typing{display:flex;gap:4px;padding:11px 13px;background:#222;border-radius:4px 13px 13px 13px;width:fit-content;}
.typing span{width:5px;height:5px;background:rgba(255,255,255,0.4);border-radius:50%;animation:bnc 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.hqbtns{padding:0 18px 11px;display:flex;gap:7px;flex-wrap:wrap;}
.hqb{font-size:10px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);border:0.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 11px;cursor:pointer;font-family:'Cairo',sans-serif;}
.hinput{background:#1A1A1A;padding:12px 18px;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;gap:9px;}
.hfi{flex:1;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);border-radius:22px;padding:9px 15px;color:white;font-size:12px;font-family:'Cairo',sans-serif;outline:none;}
.hsend{width:36px;height:36px;background:#F5C518;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
.mover.open{display:flex;}
.mbox{background:var(--card);border-radius:15px;padding:22px;width:320px;}
.mtit{font-size:14px;font-weight:700;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;}
.fi{width:100%;border:0.5px solid var(--bdr);border-radius:7px;padding:8px 11px;font-size:12px;font-family:'Cairo',sans-serif;outline:none;background:var(--bg);color:var(--txt);}
.fi:focus{border-color:#F5C518;}
.mbtns{display:flex;gap:7px;margin-top:16px;}
.bconf{flex:1;background:#F5C518;color:#1A1A1A;border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}
.bcanc{flex:1;background:var(--bg);color:var(--muted);border:0.5px solid var(--bdr);border-radius:7px;padding:9px;font-size:12px;font-family:'Cairo',sans-serif;cursor:pointer;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:#1A1A1A;color:white;padding:9px 18px;border-radius:20px;font-size:11px;font-weight:600;transition:transform .3s;z-index:200;border:1px solid #F5C518;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:768px){.sb{width:100%;height:auto;position:relative;flex-direction:row;padding:10px;}.main{margin-right:0;}.nav{flex-direction:row;padding:0;}.logo{display:none;}.usr{display:none;}}
</style>
</head>
<body>
